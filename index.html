        const setQuestion =()=>{
            countNumber=5;

            //配列questionsの中からランダムで問題文を一つ選ぶ
            currentKey=Math.floor(Math.random()*questions.length);//currentKeyは具体的な数

            questions.splice(currentKey, 1);

            //現在の問題文をリセットして新しい問題文を表示させる
            //画面に新しい問題文をセット
            entered.textContent="";

            birth.textContent=currentText.birth;

            hometown.textContent=currentText.hometown;

            enteredTextWords=[];
            remainedTextWords=currentText.yomi.split("");
        };
